<div class="input-field">
  <label *ngIf="etiqueta" [for]="idEntrada" class="input-label">{{ etiqueta }}</label>

  <div class="input-wrapper" [class.error]="mostrarError">
    <input
      pInputText
      [type]="tipoEntradaActual"
      [placeholder]="placeholder"
      [formControl]="control"
      [id]="idEntrada"
      autocomplete="off"
    />

    <button
      *ngIf="mostrarToggleContrasena"
      type="button"
      class="icon-button"
      (click)="alternarVisibilidadContrasena()"
      aria-label="Mostrar u ocultar contrasena"
    >
      <i class="pi" [ngClass]="contrasenaVisible ? 'pi-eye-slash' : 'pi-eye'"></i>
    </button>
  </div>

  <small *ngIf="mostrarError && mensajeError" class="error-message">{{ mensajeError }}</small>
</div>
