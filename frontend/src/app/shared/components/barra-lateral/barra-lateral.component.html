<button
  type="button"
  class="sidebar-hamburger"
  aria-label="Abrir menu lateral"
  (click)="abrirMovil()"
  [class.is-hidden]="abiertoMovil()"
>
  <i class="pi pi-bars"></i>
</button>

<div class="sidebar-overlay" *ngIf="abiertoMovil() && esMovil" (click)="cerrarMovil()"></div>

<aside
  class="spa-sidebar"
  [class.collapsed]="colapsado()"
  [style.transform]="!abiertoMovil() && esMovil ? 'translateX(-100%)' : 'translateX(0)'"
>
  <div class="sidebar-header">
    <div class="brand-mark">
      <span>BA</span>
    </div>
    <div class="brand-copy" *ngIf="!colapsado()">
      <span class="brand-title">BeautyAdmin</span>
      <span class="brand-subtitle">Panel principal</span>
    </div>
    <button
      type="button"
      class="ghost-button desktop-only"
      aria-label="Colapsar sidebar"
      (click)="alternarColapsarEmitir()"
    >
      <i class="pi" [ngClass]="colapsado() ? 'pi-angle-right' : 'pi-angle-left'"></i>
    </button>
    <button
      type="button"
      class="ghost-button mobile-only"
      aria-label="Cerrar sidebar"
      (click)="cerrarMovil()"
    >
      <i class="pi pi-times"></i>
    </button>
  </div>

  <div class="sidebar-search" *ngIf="!colapsado()">
    <i class="pi pi-search"></i>
    <input
      type="search"
      placeholder="Buscar..."
      [ngModel]="busqueda()"
      (ngModelChange)="busqueda.set($event)"
    />
  </div>

  <nav class="sidebar-nav">
    <ng-container *ngFor="let elemento of elementosFiltrados()">
      <button
        class="nav-section"
        type="button"
        *ngIf="esSeccionElemento(elemento) && !colapsado()"
        (click)="alternarSeccion(elemento)"
      >
        <span>{{ elemento.etiqueta }}</span>
        <i class="pi" [ngClass]="seccionAbierta(elemento.clave) ? 'pi-chevron-up' : 'pi-chevron-down'"></i>
      </button>

      <button
        *ngIf="!esSeccionElemento(elemento) && mostrarElemento(elemento)"
        type="button"
        class="nav-link"
        [class.active]="elemento.clave === claveActiva()"
        [attr.title]="colapsado() ? elemento.etiqueta : null"
        (click)="seleccionarElemento(elemento)"
        pRipple
      >
        <i class="pi" [ngClass]="elemento.icono"></i>
        <span class="label" *ngIf="!colapsado()">{{ elemento.etiqueta }}</span>
      </button>
    </ng-container>
  </nav>

  <div class="sidebar-footer">
    <div class="profile-wrapper">
      <div
        class="profile-card"
        (click)="alternarMenuCuenta()"
        [attr.title]="colapsado() ? 'Administrador' : null"
      >
        <p-avatar label="AD" shape="circle"></p-avatar>
        <div class="profile-info" *ngIf="!colapsado()">
          <span class="name">Administrador</span>
        </div>
        <span class="profile-caret" *ngIf="!colapsado()">
          <i class="pi pi-angle-down"></i>
        </span>
      </div>

      <div class="profile-menu" *ngIf="menuCuentaAbierto() && !colapsado()">
        <button type="button" pRipple>Mi cuenta</button>
        <button type="button" class="logout" pRipple>Cerrar sesion</button>
      </div>
    </div>
  </div>
</aside>
