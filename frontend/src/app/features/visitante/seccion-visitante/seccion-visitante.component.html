<div class="visita-shell">

  <ng-container *ngIf="cargando()">
    <div class="estado-cargando">
      <i class="pi pi-spin pi-spinner spinner-grande"></i>
      <p>Cargando seccion...</p>
    </div>
  </ng-container>

  <ng-container *ngIf="!cargando() && error()">
    <div class="estado-error">
      <i class="pi pi-exclamation-circle icono-error"></i>
      <p>{{ error() }}</p>
    </div>
  </ng-container>

  <ng-container *ngIf="!cargando() && !error() && seccion()">
    <header class="visita-header">
      <div class="header-deco"></div>
      <div class="header-contenido">
        <p class="visita-eyebrow">Recorrido del Museo</p>
        <h1 class="visita-titulo">{{ seccion()!.nombre }}</h1>
      </div>
    </header>

    <div class="visita-contenido">
      <p class="descripcion" *ngIf="seccion()!.descripcionBreve">{{ seccion()!.descripcionBreve }}</p>
      <spa-preview-bloques [bloques]="bloques()" [nombreSeccion]="seccion()!.nombre" />
    </div>

    <footer class="visita-footer">
      <i class="pi pi-building-columns"></i>
      <span>Museo — Recorrido Virtual</span>
    </footer>
  </ng-container>
</div>
