<section class="config-shell">
  <header class="config-header">
    <div class="copy">
      <p class="eyebrow">Museo</p>
      <h1>Configuracion del Museo</h1>
      <p class="subtitle">Informacion general, colores y apariencia del museo.</p>
    </div>
  </header>

  <ng-container *ngIf="cargando()">
    <div class="state-card">
      <i class="pi pi-spin pi-spinner"></i>
      <p>Cargando configuracion...</p>
    </div>
  </ng-container>

  <ng-container *ngIf="error()">
    <div class="state-card error">
      <i class="pi pi-exclamation-triangle"></i>
      <p>{{ error() }}</p>
    </div>
  </ng-container>

  <ng-container *ngIf="!cargando() && !error()">
    <form class="config-form" [formGroup]="formulario" (ngSubmit)="guardar()">

      <div class="config-card">
        <h2 class="card-titulo">Informacion general</h2>

        <div class="field">
          <label for="nombre">Nombre del museo <span class="required">*</span></label>
          <input
            id="nombre"
            type="text"
            class="input-text"
            placeholder="Ej: Museo Historico Nacional"
            formControlName="nombre"
          />
          <small class="field-error" *ngIf="controles.nombre.invalid && controles.nombre.touched">
            El nombre es requerido (minimo 2 caracteres).
          </small>
        </div>

        <div class="field">
          <label for="descripcion">Descripcion</label>
          <textarea
            id="descripcion"
            class="input-text textarea"
            placeholder="Descripcion breve del museo y su mision..."
            rows="4"
            formControlName="descripcion"
          ></textarea>
        </div>
      </div>

      <div class="config-card">
        <h2 class="card-titulo">Apariencia</h2>
        <p class="card-subtitulo">Personaliza los colores principales del museo.</p>

        <div class="colors-grid">
          <div class="field">
            <label for="colorPrimario">Color primario</label>
            <div class="color-input-wrapper">
              <input
                id="colorPrimario"
                type="color"
                class="color-picker"
                formControlName="colorPrimario"
              />
              <input
                type="text"
                class="input-text color-text"
                [value]="controles.colorPrimario.value"
                (input)="controles.colorPrimario.setValue($any($event.target).value)"
                placeholder="#5D4037"
              />
            </div>
            <div class="color-preview" [style.background]="controles.colorPrimario.value"></div>
          </div>

          <div class="field">
            <label for="colorSecundario">Color secundario</label>
            <div class="color-input-wrapper">
              <input
                id="colorSecundario"
                type="color"
                class="color-picker"
                formControlName="colorSecundario"
              />
              <input
                type="text"
                class="input-text color-text"
                [value]="controles.colorSecundario.value"
                (input)="controles.colorSecundario.setValue($any($event.target).value)"
                placeholder="#C5B358"
              />
            </div>
            <div class="color-preview" [style.background]="controles.colorSecundario.value"></div>
          </div>
        </div>
      </div>

      <div class="form-footer">
        <button type="submit" class="primary-btn" [disabled]="guardando()">
          <i class="pi" [class.pi-check]="!guardando()" [class.pi-spin]="guardando()" [class.pi-spinner]="guardando()"></i>
          {{ guardando() ? 'Guardando...' : 'Guardar configuracion' }}
        </button>
      </div>
    </form>
  </ng-container>
</section>

<p-toast position="bottom-right"></p-toast>
