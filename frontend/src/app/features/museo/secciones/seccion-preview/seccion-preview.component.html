<div class="visita-shell">

  <header class="visita-header">
    <div class="header-deco"></div>
    <div class="header-contenido">
      <p class="visita-eyebrow">Recorrido del Museo</p>
      <h1 class="visita-titulo">{{ seccion.nombre }}</h1>
      <p class="visita-subtitulo" *ngIf="seccion.subtitulo">{{ seccion.subtitulo }}</p>
    </div>
  </header>

  <div class="visita-contenido">

    <!-- Periodo historico -->
    <div class="periodo-tag" *ngIf="seccion.periodoHistorico">
      <i class="pi pi-clock"></i>
      {{ seccion.periodoHistorico }}
    </div>

    <!-- Descripcion breve -->
    <p class="descripcion" *ngIf="seccion.descripcionBreve">{{ seccion.descripcionBreve }}</p>

    <!-- Bloques -->
    <div class="bloques-contenedor" *ngIf="bloques.length > 0">
      <spa-renderer-bloque
        *ngFor="let bloque of bloques"
        [bloque]="bloque"
        [modoEdicion]="false"
      />
    </div>

    <!-- Sin contenido -->
    <div class="sin-contenido"
      *ngIf="!seccion.descripcionBreve && bloques.length === 0">
      <i class="pi pi-image"></i>
      <p>Esta seccion aun no tiene contenido cargado.</p>
    </div>

  </div>

  <footer class="visita-footer">
    <i class="pi pi-building-columns"></i>
    <span>Museo — Recorrido Virtual</span>
  </footer>

</div>
