<div class="visita-shell">

  <header class="visita-header">
    <div class="header-deco"></div>
    <div class="header-contenido">
      <p class="visita-eyebrow">Recorrido del Museo</p>
      <h1 class="visita-titulo">{{ seccion.nombre }}</h1>
      <p class="visita-subtitulo" *ngIf="seccion.subtitulo">{{ seccion.subtitulo }}</p>
    </div>
  </header>

  <div class="visita-contenido">

    <!-- Periodo historico -->
    <div class="periodo-tag" *ngIf="seccion.periodoHistorico">
      <i class="pi pi-clock"></i>
      {{ seccion.periodoHistorico }}
    </div>

    <!-- Descripcion breve -->
    <p class="descripcion" *ngIf="seccion.descripcionBreve">{{ seccion.descripcionBreve }}</p>

    <!-- Galeria multimedia -->
    <div class="galeria" *ngIf="elementosActivos().length > 0">
      <h2 class="seccion-subtitulo">Galeria</h2>
      <div class="galeria-lista">
        <div
          class="media-item"
          *ngFor="let elem of elementosActivos()"
          [class.media-item-principal]="elem.esPrincipal"
        >
          <!-- Imagen local -->
          <ng-container *ngIf="esImagenLocal(elem)">
            <img
              [src]="imagenUrl(elem)"
              [alt]="elem.titulo || seccion.nombre"
              class="media-imagen"
              loading="lazy"
            />
          </ng-container>

          <!-- Video externo (YouTube / Vimeo) -->
          <ng-container *ngIf="esVideoExterno(elem)">
            <div class="video-wrapper">
              <iframe
                [src]="embedUrl(elem)"
                [title]="elem.titulo || 'Video'"
                frameborder="0"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowfullscreen
                class="media-iframe"
              ></iframe>
            </div>
          </ng-container>

          <!-- Video local -->
          <ng-container *ngIf="esVideoLocal(elem)">
            <div class="video-wrapper">
              <video
                [src]="imagenUrl(elem)"
                controls
                class="media-video"
                [title]="elem.titulo || 'Video'"
              ></video>
            </div>
          </ng-container>

          <div class="media-caption" *ngIf="elem.titulo">
            <span class="caption-titulo">{{ elem.titulo }}</span>
            <span class="caption-desc" *ngIf="elem.descripcion">{{ elem.descripcion }}</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Sin contenido -->
    <div class="sin-contenido"
      *ngIf="!seccion.descripcionBreve && elementosActivos().length === 0">
      <i class="pi pi-image"></i>
      <p>Esta seccion aun no tiene contenido cargado.</p>
    </div>

  </div>

  <footer class="visita-footer">
    <i class="pi pi-building-columns"></i>
    <span>Museo — Recorrido Virtual</span>
  </footer>

</div>
