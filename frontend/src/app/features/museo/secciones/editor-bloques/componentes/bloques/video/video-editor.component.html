<form [formGroup]="formulario" class="flex flex-col gap-4">

  <div class="flex flex-col gap-1">
    <label class="text-sm font-semibold" style="color: var(--color-texto-oscuro)">
      Origen
    </label>
    <p-dropdown
      formControlName="origen"
      [options]="opcionesOrigen"
      optionLabel="label"
      optionValue="value"
      styleClass="w-full"
      (onChange)="alCambiarOrigen($event.value)" />
  </div>

  <div class="flex flex-col gap-1">
    <label class="text-sm font-semibold" style="color: var(--color-texto-oscuro)">
      URL del video <span class="text-red-500">*</span>
    </label>
    <div class="flex gap-2">
      <textarea
        pInputTextarea
        [autoResize]="true"
        rows="1"
        formControlName="url"
        placeholder="https://www.youtube.com/watch?v=... o /uploads/..."
        class="flex-1 resize-none"
        style="max-height:80px;overflow-y:auto"></textarea>
      @if (esLocal()) {
        <p-button
          icon="pi pi-folder-open"
          severity="info"
          [outlined]="true"
          pTooltip="Seleccionar de biblioteca"
          tooltipPosition="top"
          (onClick)="selectorVisible.set(true)" />
      }
    </div>
  </div>

  <div class="flex flex-col gap-1">
    <label class="text-sm font-semibold" style="color: var(--color-texto-oscuro)">
      Título <span class="text-xs font-normal opacity-60">(opcional)</span>
    </label>
    <textarea
      pInputTextarea
      [autoResize]="true"
      rows="1"
      formControlName="tituloEs"
      placeholder="Título del video"
      class="w-full resize-none"
      style="max-height:80px;overflow-y:auto"></textarea>
  </div>

  <div class="flex flex-col gap-1">
    <label class="text-sm font-semibold" style="color: var(--color-texto-oscuro)">
      Caption <span class="text-xs font-normal opacity-60">(opcional)</span>
    </label>
    <textarea
      pInputTextarea
      [autoResize]="true"
      rows="1"
      formControlName="captionEs"
      placeholder="Descripción breve del video"
      class="w-full resize-none"
      style="max-height:80px;overflow-y:auto"></textarea>
  </div>

</form>

<spa-selector-media
  [visible]="selectorVisible()"
  (visibleChange)="selectorVisible.set($event)"
  tipoFiltrado="video"
  modo="uno"
  (seleccionado)="alSeleccionarDesdeLibreria($event)" />
