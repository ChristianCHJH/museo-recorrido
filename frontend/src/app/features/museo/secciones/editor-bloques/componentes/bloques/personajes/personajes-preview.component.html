<div class="extra-bloque">
  <h2 class="seccion-subtitulo" *ngIf="config.titulo?.es">{{ config.titulo!.es }}</h2>

  <ng-container *ngIf="tienePersonajes; else sinPersonajes">
    <div class="flex flex-col gap-3">
      <div
        *ngFor="let p of config.personajes"
        class="flex items-start gap-3">
        <img
          *ngIf="p.imagenUrl"
          [src]="p.imagenUrl"
          [alt]="p.nombre"
          class="personaje-img" />
        <div class="flex flex-col gap-0.5">
          <strong style="font-size: 0.88rem; color: var(--color-texto-oscuro)">{{ p.nombre }}</strong>
          <em *ngIf="p.rol?.es" style="font-size: 0.78rem; color: var(--color-secundario)">{{ p.rol!.es }}</em>
          <p *ngIf="p.descripcion?.es" style="font-size: 0.82rem; line-height: 1.6; color: var(--color-texto-oscuro); margin: 0;">{{ p.descripcion!.es }}</p>
        </div>
      </div>
    </div>
  </ng-container>

  <ng-template #sinPersonajes>
    <p class="bloque-placeholder">Sin personajes</p>
  </ng-template>
</div>
