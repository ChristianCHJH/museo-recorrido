<div class="lista-bloques-shell">

  <!-- Estado vacío -->
  <div *ngIf="bloques.length === 0" class="lista-vacia">
    <i class="pi pi-inbox"></i>
    <p>Sin bloques todavia.</p>
    <span>Usa el panel izquierdo para agregar contenido.</span>
  </div>

  <!-- Lista drag & drop -->
  <div
    cdkDropList
    [cdkDropListData]="bloques"
    (cdkDropListDropped)="alSoltar($event)"
    class="flex flex-column gap-3">

    <ng-container *ngFor="let bloque of bloques; let i = index; trackBy: trackById">

      <!-- Botón insertar antes (solo entre bloques) -->
      <button
        *ngIf="i > 0"
        type="button"
        class="btn-insertar"
        pTooltip="Agregar bloque aqui"
        tooltipPosition="right"
        (click)="abrirMiniPaleta($event, i, op)">
        <i class="pi pi-plus"></i>
      </button>

      <!-- Tarjeta del bloque -->
      <div cdkDrag class="bloque-card">

        <!-- Drag handle -->
        <div cdkDragHandle class="drag-handle" pTooltip="Arrastrar para reordenar" tooltipPosition="left">
          <i class="pi pi-bars"></i>
        </div>

        <!-- Contenido de la tarjeta -->
        <div class="bloque-card-body">
          <!-- Cabecera del bloque -->
          <div class="bloque-card-header">
            <div class="bloque-tipo-badge">
              <i [class]="iconoTipo(bloque.tipo)"></i>
              <span>{{ labelTipo(bloque.tipo) }}</span>
            </div>
            <spa-toolbar-bloque
              [esPrimero]="i === 0"
              [esUltimo]="i === bloques.length - 1"
              (moverArriba)="moverArriba(i)"
              (moverAbajo)="moverAbajo(i)"
              (duplicar)="duplicarBloque.emit(bloque.id)"
              (eliminar)="eliminarBloque.emit(bloque.id)" />
          </div>

          <!-- Editor del bloque -->
          <div class="bloque-card-content">
            <spa-renderer-bloque
              [bloque]="bloque"
              [modoEdicion]="true"
              (configChange)="alCambiarConfig(bloque.id, $event)" />
          </div>
        </div>

        <!-- Drag placeholder -->
        <div *cdkDragPlaceholder class="drag-placeholder"></div>
      </div>

    </ng-container>

    <!-- Botón insertar al final -->
    <button
      *ngIf="bloques.length > 0"
      type="button"
      class="btn-insertar btn-insertar-final"
      pTooltip="Agregar bloque al final"
      tooltipPosition="right"
      (click)="abrirMiniPaleta($event, bloques.length, op)">
      <i class="pi pi-plus"></i>
    </button>

  </div>

</div>

<!-- OverlayPanel compartido — una sola instancia para todos los botones "+" -->
<p-overlayPanel #op>
  <div class="mini-paleta">
    <button
      *ngFor="let def of tiposDisponibles"
      type="button"
      class="mini-paleta-item"
      (click)="alElegirTipo(def.tipo, op)">
      <i [class]="def.icono"></i>
      <span>{{ def.label }}</span>
    </button>
  </div>
</p-overlayPanel>
