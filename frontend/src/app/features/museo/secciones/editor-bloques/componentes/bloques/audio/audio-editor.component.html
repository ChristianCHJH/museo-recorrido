<form [formGroup]="formulario" class="flex flex-col gap-4">

  <div class="flex flex-col gap-1">
    <label class="text-sm font-semibold" style="color: var(--color-texto-oscuro)">
      URL del audio <span class="text-red-500">*</span>
    </label>
    <input
      pInputText
      type="text"
      formControlName="url"
      placeholder="https://... o /uploads/..."
      class="w-full" />
  </div>

  <div class="flex flex-col gap-1">
    <label class="text-sm font-semibold" style="color: var(--color-texto-oscuro)">
      Etiqueta <span class="text-xs font-normal opacity-60">(opcional)</span>
    </label>
    <input
      pInputText
      type="text"
      formControlName="etiquetaEs"
      placeholder="Audio narrado"
      class="w-full" />
  </div>

  <div class="flex flex-col gap-1">
    <label class="text-sm font-semibold" style="color: var(--color-texto-oscuro)">
      Duración en segundos <span class="text-xs font-normal opacity-60">(opcional)</span>
    </label>
    <p-inputNumber
      formControlName="duracion"
      [min]="0"
      [useGrouping]="false"
      styleClass="w-full"
      placeholder="Ej: 120" />
  </div>

  <div class="flex items-start gap-2 p-3 rounded-lg text-xs" style="background: #f0f4ff; color: #3b4fa0;">
    <i class="pi pi-info-circle mt-0.5 flex-shrink-0"></i>
    <span>En Fase 5 se podrá seleccionar el archivo desde la biblioteca de medios.</span>
  </div>

</form>
