<form [formGroup]="formulario" class="flex flex-col gap-4">

  <div class="flex flex-col gap-1">
    <label class="text-sm font-semibold" style="color: var(--color-texto-oscuro)">
      URL del audio <span class="text-red-500">*</span>
    </label>
    <div class="flex gap-2">
      <input
        pInputText
        type="text"
        formControlName="url"
        placeholder="https://... o /uploads/..."
        class="flex-1" />
      <p-button
        icon="pi pi-folder-open"
        severity="info"
        [outlined]="true"
        pTooltip="Seleccionar de biblioteca"
        tooltipPosition="top"
        (onClick)="selectorVisible.set(true)" />
    </div>
  </div>

  <div class="flex flex-col gap-1">
    <label class="text-sm font-semibold" style="color: var(--color-texto-oscuro)">
      Etiqueta <span class="text-xs font-normal opacity-60">(opcional)</span>
    </label>
    <input
      pInputText
      type="text"
      formControlName="etiquetaEs"
      placeholder="Audio narrado"
      class="w-full" />
  </div>

  <div class="flex flex-col gap-1">
    <label class="text-sm font-semibold" style="color: var(--color-texto-oscuro)">
      Duración en segundos <span class="text-xs font-normal opacity-60">(opcional)</span>
    </label>
    <p-inputNumber
      formControlName="duracion"
      [min]="0"
      [useGrouping]="false"
      styleClass="w-full"
      placeholder="Ej: 120" />
  </div>

</form>

<spa-selector-media
  [visible]="selectorVisible()"
  (visibleChange)="selectorVisible.set($event)"
  tipoFiltrado="audio"
  modo="uno"
  (seleccionado)="alSeleccionarDesdeLibreria($event)" />
