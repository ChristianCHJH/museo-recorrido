<form [formGroup]="formulario" class="flex flex-col gap-4">

  <div class="flex flex-col gap-1">
    <label class="text-sm font-semibold" style="color: var(--color-texto-oscuro)">
      Audio <span class="text-red-500">*</span>
    </label>
    @if (formulario.get('url')?.value; as url) {
      <div style="padding: 8px 12px; background: #f5f5f5; border-radius: 4px; font-size: 13px; color: #555;">
        <span class="pi pi-volume-up" style="margin-right: 8px;"></span>{{ url.split('/').pop() }}
      </div>
    }
    <p-button
      label="Seleccionar de biblioteca"
      icon="pi pi-folder-open"
      severity="info"
      [outlined]="true"
      styleClass="w-full"
      (onClick)="selectorVisible.set(true)" />
  </div>

  <div class="flex flex-col gap-1">
    <label class="text-sm font-semibold" style="color: var(--color-texto-oscuro)">
      Etiqueta <span class="text-xs font-normal opacity-60">(opcional)</span>
    </label>
    <textarea
      pInputTextarea
      [autoResize]="true"
      rows="1"
      formControlName="etiquetaEs"
      placeholder="Audio narrado"
      class="w-full resize-none"
      style="max-height:80px;overflow-y:auto"></textarea>
  </div>

  <div class="flex flex-col gap-1">
    <label class="text-sm font-semibold" style="color: var(--color-texto-oscuro)">
      Duración en segundos <span class="text-xs font-normal opacity-60">(opcional)</span>
    </label>
    <p-inputNumber
      formControlName="duracion"
      [min]="0"
      [useGrouping]="false"
      styleClass="w-full"
      placeholder="Ej: 120" />
  </div>

</form>

<spa-selector-media
  [visible]="selectorVisible()"
  (visibleChange)="selectorVisible.set($event)"
  tipoFiltrado="audio"
  modo="uno"
  (seleccionado)="alSeleccionarDesdeLibreria($event)" />
