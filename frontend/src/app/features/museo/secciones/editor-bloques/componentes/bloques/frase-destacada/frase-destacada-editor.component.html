<form [formGroup]="formulario" class="flex flex-col gap-4">

  <div class="flex flex-col gap-1">
    <label class="text-sm font-semibold" style="color: var(--color-texto-oscuro)">
      Frase <span class="text-red-500">*</span>
    </label>
    <textarea
      pInputTextarea
      formControlName="textoEs"
      rows="4"
      placeholder="Escribe la frase o cita destacada..."
      class="w-full resize-y"></textarea>
  </div>

  <div class="flex flex-col gap-1">
    <label class="text-sm font-semibold" style="color: var(--color-texto-oscuro)">
      Autor <span class="text-xs font-normal opacity-60">(opcional)</span>
    </label>
    <input
      pInputText
      type="text"
      formControlName="autorEs"
      placeholder="Nombre del autor o fuente..."
      class="w-full" />
  </div>

</form>
