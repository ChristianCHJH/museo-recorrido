<ng-container *ngIf="tieneUrl; else sinAudio">
  <div class="audio-block">
    <div class="audio-label">
      <i class="pi pi-volume-up"></i>
      <span>{{ etiqueta }}</span>
    </div>
    <audio controls style="width:100%">
      <source [src]="config.url" />
    </audio>
  </div>
</ng-container>

<ng-template #sinAudio>
  <p class="bloque-placeholder">
    <i class="pi pi-volume-up"></i> Sin audio
  </p>
</ng-template>
