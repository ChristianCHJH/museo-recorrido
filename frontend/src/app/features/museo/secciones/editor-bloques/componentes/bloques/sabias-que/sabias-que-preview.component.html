<ng-container *ngIf="tieneTexto; else sinContenido">
  <div class="curiosos-bloque">
    <div class="curiosos-header">
      <i class="pi pi-lightbulb"></i>
      <span>{{ etiqueta }}</span>
    </div>
    <p>{{ config.texto.es }}</p>
  </div>
</ng-container>

<ng-template #sinContenido>
  <p class="bloque-placeholder">Sin contenido</p>
</ng-template>
