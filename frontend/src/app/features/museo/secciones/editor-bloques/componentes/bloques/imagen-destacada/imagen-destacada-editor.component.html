<form [formGroup]="formulario" class="flex flex-col gap-4">

  <div class="flex flex-col gap-1">
    <label class="text-sm font-semibold" style="color: var(--color-texto-oscuro)">
      URL de la imagen <span class="text-red-500">*</span>
    </label>
    <div class="flex gap-2">
      <input
        pInputText
        type="text"
        formControlName="url"
        placeholder="https://... o /uploads/..."
        class="flex-1" />
      <p-button
        icon="pi pi-folder-open"
        severity="info"
        [outlined]="true"
        pTooltip="Seleccionar de biblioteca"
        tooltipPosition="top"
        (onClick)="selectorVisible.set(true)" />
    </div>
  </div>

  <div class="flex flex-col gap-1">
    <label class="text-sm font-semibold" style="color: var(--color-texto-oscuro)">
      Título <span class="text-xs font-normal opacity-60">(opcional)</span>
    </label>
    <input
      pInputText
      type="text"
      formControlName="tituloEs"
      placeholder="Título de la imagen"
      class="w-full" />
  </div>

  <div class="flex flex-col gap-1">
    <label class="text-sm font-semibold" style="color: var(--color-texto-oscuro)">
      Caption <span class="text-xs font-normal opacity-60">(opcional)</span>
    </label>
    <input
      pInputText
      type="text"
      formControlName="captionEs"
      placeholder="Descripción breve de la imagen"
      class="w-full" />
  </div>

  <div class="flex flex-col gap-1">
    <label class="text-sm font-semibold" style="color: var(--color-texto-oscuro)">
      Altura
    </label>
    <p-dropdown
      formControlName="altura"
      [options]="opcionesAltura"
      optionLabel="label"
      optionValue="value"
      styleClass="w-full" />
  </div>

</form>

<spa-selector-media
  [visible]="selectorVisible()"
  (visibleChange)="selectorVisible.set($event)"
  tipoFiltrado="imagen"
  modo="uno"
  (seleccionado)="alSeleccionarDesdeLibreria($event)" />
