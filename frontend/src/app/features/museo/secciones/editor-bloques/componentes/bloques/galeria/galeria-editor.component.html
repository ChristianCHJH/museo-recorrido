<form [formGroup]="formulario" class="flex flex-col gap-4">

  <div class="flex flex-col gap-1">
    <label class="text-sm font-semibold" style="color: var(--color-texto-oscuro)">
      Título de la galería <span class="text-xs font-normal opacity-60">(opcional)</span>
    </label>
    <textarea
      pInputTextarea
      [autoResize]="true"
      rows="1"
      formControlName="tituloEs"
      placeholder="Ej: Galería de imágenes"
      class="w-full resize-none"
      style="max-height:80px;overflow-y:auto"></textarea>
  </div>

  <div class="flex flex-col gap-1">
    <label class="text-sm font-semibold" style="color: var(--color-texto-oscuro)">
      Disposición
    </label>
    <p-dropdown
      formControlName="disposicion"
      [options]="opcionesDisposicion"
      optionLabel="label"
      optionValue="value"
      styleClass="w-full" />
  </div>

  <div class="flex flex-col gap-3">
    <div
      *ngFor="let item of imagenesArray.controls; let i = index"
      [formGroup]="$any(item)"
      class="flex flex-col gap-2 p-3 rounded-lg border"
      style="border-color: rgba(93,64,55,0.15); background: var(--surface-section, #faf8f0)">

      <div class="flex items-center justify-between">
        <span class="text-xs font-bold uppercase tracking-wide opacity-60" style="color: var(--color-primario)">
          Imagen {{ i + 1 }}
        </span>
        <p-button
          icon="pi pi-trash"
          severity="danger"
          [text]="true"
          [rounded]="true"
          size="small"
          (onClick)="eliminarImagen(i)" />
      </div>

      <div class="flex flex-col gap-1">
        <label class="text-xs font-semibold" style="color: var(--color-texto-oscuro)">
          URL imagen <span class="text-red-500">*</span>
        </label>
        <textarea
          pInputTextarea
          [autoResize]="true"
          rows="1"
          formControlName="url"
          placeholder="https://... o /uploads/..."
          class="w-full resize-none"
          style="max-height:80px;overflow-y:auto"></textarea>
      </div>

      <div class="flex flex-col gap-1">
        <label class="text-xs font-semibold" style="color: var(--color-texto-oscuro)">
          Título <span class="text-xs font-normal opacity-60">(opcional)</span>
        </label>
        <textarea
          pInputTextarea
          [autoResize]="true"
          rows="1"
          formControlName="tituloEs"
          placeholder="Título de la imagen"
          class="w-full resize-none"
          style="max-height:80px;overflow-y:auto"></textarea>
      </div>

      <div class="flex flex-col gap-1">
        <label class="text-xs font-semibold" style="color: var(--color-texto-oscuro)">
          Caption <span class="text-xs font-normal opacity-60">(opcional)</span>
        </label>
        <textarea
          pInputTextarea
          [autoResize]="true"
          rows="1"
          formControlName="captionEs"
          placeholder="Descripción breve"
          class="w-full resize-none"
          style="max-height:80px;overflow-y:auto"></textarea>
      </div>

    </div>
  </div>

  <!-- Botones de agregar -->
  <div class="flex gap-2">
    <p-button
      label="Agregar imagen"
      icon="pi pi-plus"
      severity="secondary"
      [outlined]="true"
      styleClass="flex-1"
      (onClick)="agregarImagen()" />
    <p-button
      label="Desde biblioteca"
      icon="pi pi-folder-open"
      severity="info"
      [outlined]="true"
      styleClass="flex-1"
      (onClick)="selectorVisible.set(true)" />
  </div>

</form>

<spa-selector-media
  [visible]="selectorVisible()"
  (visibleChange)="selectorVisible.set($event)"
  tipoFiltrado="imagen"
  modo="multiple"
  (seleccionados)="alSeleccionarDesdeLibreria($event)" />
