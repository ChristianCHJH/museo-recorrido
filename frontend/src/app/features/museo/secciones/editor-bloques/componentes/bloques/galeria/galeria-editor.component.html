<form [formGroup]="formulario" class="flex flex-col gap-4">

  <div class="flex flex-col gap-1">
    <label class="text-sm font-semibold" style="color: var(--color-texto-oscuro)">
      Título de la galería <span class="text-xs font-normal opacity-60">(opcional)</span>
    </label>
    <input
      pInputText
      type="text"
      formControlName="tituloEs"
      placeholder="Ej: Galería de imágenes"
      class="w-full" />
  </div>

  <div class="flex flex-col gap-1">
    <label class="text-sm font-semibold" style="color: var(--color-texto-oscuro)">
      Disposición
    </label>
    <p-dropdown
      formControlName="disposicion"
      [options]="opcionesDisposicion"
      optionLabel="label"
      optionValue="value"
      styleClass="w-full" />
  </div>

  <div class="flex flex-col gap-3">
    <div
      *ngFor="let item of imagenesArray.controls; let i = index"
      [formGroup]="$any(item)"
      class="flex flex-col gap-2 p-3 rounded-lg border"
      style="border-color: rgba(93,64,55,0.15); background: var(--surface-section, #faf8f0)">

      <div class="flex items-center justify-between">
        <span class="text-xs font-bold uppercase tracking-wide opacity-60" style="color: var(--color-primario)">
          Imagen {{ i + 1 }}
        </span>
        <p-button
          icon="pi pi-trash"
          severity="danger"
          [text]="true"
          [rounded]="true"
          size="small"
          (onClick)="eliminarImagen(i)" />
      </div>

      <div class="flex flex-col gap-1">
        <label class="text-xs font-semibold" style="color: var(--color-texto-oscuro)">
          URL imagen <span class="text-red-500">*</span>
        </label>
        <input
          pInputText
          type="text"
          formControlName="url"
          placeholder="https://... o /uploads/..."
          class="w-full" />
      </div>

      <div class="flex flex-col gap-1">
        <label class="text-xs font-semibold" style="color: var(--color-texto-oscuro)">
          Título <span class="text-xs font-normal opacity-60">(opcional)</span>
        </label>
        <input
          pInputText
          type="text"
          formControlName="tituloEs"
          placeholder="Título de la imagen"
          class="w-full" />
      </div>

      <div class="flex flex-col gap-1">
        <label class="text-xs font-semibold" style="color: var(--color-texto-oscuro)">
          Caption <span class="text-xs font-normal opacity-60">(opcional)</span>
        </label>
        <input
          pInputText
          type="text"
          formControlName="captionEs"
          placeholder="Descripción breve"
          class="w-full" />
      </div>

    </div>
  </div>

  <p-button
    label="Agregar imagen"
    icon="pi pi-plus"
    severity="secondary"
    [outlined]="true"
    styleClass="w-full"
    (onClick)="agregarImagen()" />

  <div class="flex items-start gap-2 p-3 rounded-lg text-xs" style="background: #f0f4ff; color: #3b4fa0;">
    <i class="pi pi-info-circle mt-0.5 flex-shrink-0"></i>
    <span>En Fase 5 se podrá seleccionar imágenes desde la biblioteca de medios.</span>
  </div>

</form>
