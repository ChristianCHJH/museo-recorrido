version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: museo-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DB_HOST: host.docker.internal
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASS: admin
      DB_NAME: museo_qr_db
      DB_SCHEMA: public
      JWT_SECRET: museo_qr_jwt_secret_2026
      JWT_EXPIRATION: 15m
      REFRESH_TOKEN_EXPIRATION: 7d
      APP_URL: http://localhost:4200
      NODE_ENV: production
      STORAGE: local
      CLOUDINARY_CLOUD_NAME: dovxgcpc5
      CLOUDINARY_API_KEY: 828716991748763
      CLOUDINARY_API_SECRET: eNN5r1FRga2OpE8fdrXuPyG0gq8
    volumes:
      # Persistencia de archivos subidos
      - museo-uploads:/app/uploads
      # Logs del backend
      - museo-logs-backend:/app/logs
      # Volumen anónimo para node_modules (mejor performance en Docker)
      - /app/node_modules
    networks:
      - museo-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NG_APP_API_URL: http://localhost:3000
    container_name: museo-frontend
    restart: unless-stopped
    ports:
      - "4200:4200"
    volumes:
      # Persistencia de caché de build
      - museo-frontend-cache:/app/.angular
      # Volumen anónimo para node_modules
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - museo-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4200"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  museo-network:
    driver: bridge

volumes:
  # Volúmenes named para persistencia
  museo-uploads:
    driver: local
  museo-logs-backend:
    driver: local
  museo-frontend-cache:
    driver: local
